server {
    listen 80;
    listen [::]:80;
    
    server_name localhost;
    
    # Diretório raiz do site
    root /var/www/technova;
    index index.html;
    
    # Logs personalizados
    access_log /var/log/nginx/technova/access.log;
    error_log /var/log/nginx/technova/error.log;
    
    # Página de erro 404 personalizada
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
    
    # Configuração principal
    location / {
        try_files $uri $uri/ =404;
    }
    
    # Cache para arquivos estáticos
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Segurança: Desabilitar listagem de diretórios
    autoindex off;
    
    # Segurança: Ocultar versão do Nginx
    server_tokens off;
    
    # Segurança: Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Negar acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
